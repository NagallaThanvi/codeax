version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: codeax-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongo:27017}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-codeax}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/codeax}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: codeax-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      - backend

  mongo:
    image: mongo:7.0
    container_name: codeax-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
